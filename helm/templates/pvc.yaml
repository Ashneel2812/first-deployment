apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ .Release.Name }}-pvc
  namespace: {{ .Values.namespace }}

spec:
  accessModes:
    - {{ .Values.persistence.accessMode }}

  storageClassName: {{ .Values.persistence.storageClass }}

  resources:
    requests:
      storage: {{ .Values.persistence.size }}